server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Проксируем API на backend, чтобы фронт и API были на одном origin —
    # это нужно для httpOnly cookie с JWT (SameSite=Lax работает только
    # без кросс-доменных запросов между портами/доменами).
    location /api/ {
        proxy_pass http://backend:4000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cookie_path / /;
    }

    # SPA fallback — все маршруты ведут на index.html, React Router сам разберётся
    location / {
        try_files $uri $uri/ /index.html;
    }
}
